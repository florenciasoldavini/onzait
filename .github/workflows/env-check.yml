name: CI Checks

on:
  pull_request:
  push:
    branches:
      - main
      - development

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Documentation drift check (.env.example)
        run: npm run env:check

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  web_build:
    name: Web build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Build production web app
        run: npm run build

  edge_functions:
    name: Edge Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          cache: true
          deno-version: v2.1.x

      - name: Verify Edge Functions
        run: npm run functions:verify

  ci-checks:
    name: ci-checks
    if: ${{ always() }}
    needs:
      - quality
      - tests
      - web_build
      - edge_functions
    runs-on: ubuntu-latest

    steps:
      - name: Confirm all required jobs passed
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
          WEB_BUILD_RESULT: ${{ needs.web_build.result }}
          EDGE_FUNCTIONS_RESULT: ${{ needs.edge_functions.result }}
        run: |
          if [[ "$QUALITY_RESULT" != "success" || \
                "$TESTS_RESULT" != "success" || \
                "$WEB_BUILD_RESULT" != "success" || \
                "$EDGE_FUNCTIONS_RESULT" != "success" ]]; then
            echo "One or more required CI jobs did not pass."
            exit 1
          fi

          echo "All required CI jobs passed."
