name: Env Check

on:
  pull_request:
  push:
    branches:
      - main
      - development
      - feature/**

jobs:
  env-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify .env.example is up to date
        run: npm run env:check
